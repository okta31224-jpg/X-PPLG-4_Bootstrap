<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="p-5">
    <div class="container text-center">
        <h2 class="mb-4">Ingin tahu rahasia sukses?</h2>

        <button
        type="button"
        class="btn btn-primary btn-lg"
        data-bs-toggle="modal"
        data-bs-target="#modalRahasia"
        >klik untuk lihat kejutan!
        </button>
    </div>

    <div
    class="modal fade"
    id="modalRahasia"
    tabindex="-1"
    aria-labelledby="judulmodal"
    aria-hidden="true"
    >

    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="judulModal">Pesan Untukmu</h5>
                <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="close"
                ></button>
            </div>

            <div class="modal-body text-center">
                <img 
                src="asset/ugm.jpeg" 
                class="rounded-circle mb-3"
                alt="icon" 
                />
                <p class="fs-5">
                    Rahasia sukses adalah : <strong>Terus belajar dan jangan takut salah saat coding!</strong>
                </p>
            </div>

                <div class="modal-footer">
                    <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">
                    tutup
                    </button>
                    <button type="button" class="btn-btn membawatnya">Paham!</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
