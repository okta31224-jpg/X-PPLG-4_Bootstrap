<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">formulir pendaftaran</h4>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                                <input
                                type="text"
                                class="form-contorl"
                                id="namalengkap"
                                placeholder="Masukkan nama anda"
                                />
                            </div>

                            <div class="mb-3">
                                <label for="inputEmail" class="form-label">Alamat Email</label>
                                <input
                                type="email"
                                class="form-control"
                                id="inputEmail"
                                placeholder="nama@email.com"
                                />
                                <div class="form-text">
                                    kami tidak akan membagikan email anda kepada siapapun.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="pilihProgram" class="form-label">Pilih Program</label>
                                <select class="from-select" id="pilihProgram">
                                    <option selected>Buka menu pilihan ini</option>
                                    <option value="1">Web Development</option>
                                    <option value="2">Data Science</option>
                                    <option value="3">Digital Marketing</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Jenis Kelamin</label>
                                <div class="form-check form-check-inline">
                                    <input
                                    class="form-check-input"
                                    type="radio"
                                    nama="gender"
                                    id="laki"
                                    value="L"
                                />
                                <label class="form-check-label" for="laki">Laki-laki</label>
                            </div>
                            <div class="form-check form-check-inline">
                                    <input
                                    class="form-check-input"
                                    type="radio"
                                    nama="gender"
                                    id="perempuan"
                                    value="P"
                                />
                                <label class="form-check-label" for="perempuan">Perempuan</label>
                            </div>
                            </div>

                            <div class="mb-3">
                                <label for="catatan" class="form-label">Alamat Lengkap</label>
                                    <textarea 
                                    class="form-control" 
                                    id="catatan"
                                    rows="3"
                                    ></textarea>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="setuju"/>
                                <label class="form-check-label" for="setuju">Saya setuju dengan syarat dan ketentuan.</label>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Kirim Pendaftaran</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
